<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="16" y1="18" x2="48" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="48" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="48" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark on first row -->
  <polyline points="18,17 22,21 30,13" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="15" width="12" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Progress bar on second row -->
  <circle cx="22" cy="28" r="4" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="34" y="25" width="10" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Empty checkbox on third row -->
  <rect x="18" y="34" width="8" height="8" rx="2" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="34" y="35" width="8" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Bottom accent bar -->
  <rect x="16" y="48" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="16" y="48" width="20" height="3" rx="1.5" fill="#fff"/>
</svg>
